    * {

      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, sans-serif;
      background: #000;
      color: white;
      overflow: hidden;
      height: 100vh;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(135deg, #ff006e, #8b00ff, #ff0054);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      box-shadow: 0 4px 12px rgba(255, 0, 110, 0.3);
      transition: display 0.3s ease;
    }
    .header.hidden {
      display: none;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chilli-logo {
      font-size: 34px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .site-name {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(45deg, #fff, #ffb3d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .video-container {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .video-container.full-height {
      top: 0;
      height: 100vh;
    }
    .video-container::-webkit-scrollbar {
      display: none;
    }
    .video-wrapper {
      position: relative;
      width: 100%;
      height: calc(100vh - 60px);
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    .video-wrapper.full-height {
      height: 100vh;
    }
    .video-player {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: none;
    }
    .embed-player {
      width: 100%;
      height: 100%;
      border: none;
    }
    .video-loader {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 50px;
      height: 50px;
      margin-left: -25px;
      margin-top: -25px;
      border: 5px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ff006e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      z-index: 11;
      display: none;
    }
    .loader-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, 35px);
      color: #ff006e;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      z-index: 11;
      display: none;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      white-space: nowrap;
      animation: pulse 1s ease-in-out infinite;
    }
    .video-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0033, #330033, #4d0052);
      color: #ff6ec7;
      font-size: 24px;
      font-weight: 600;
      cursor: pointer;
      flex-direction: column;
      gap: 20px;
      position: relative;
    }
    .video-placeholder video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

      z-index: 2;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
    }
    .tap-to-play {
      font-size: 18px;
      opacity: 0.8;
      animation: fadeIn 1s ease-in-out infinite alternate;
    }
    @keyframes fadeIn {
      from { opacity: 0.5; }
      to { opacity: 1; }
    }
    .video-info {
      position: absolute;
      bottom: 80px;
      left: 20px;

      align-items: center;

    .scroll-indicator {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-10px); }
    }
    .ad-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;

      border-radius: 20px;
      color: #ff6ec7;
      font-size: 20px;
      text-align: center;
      border: 3px solid #ff006e;
      box-shadow: 0 0 30px rgba(255, 0, 110, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 95%;
      max-width: 450px;
    }
    .ad-image-link {
      display: block;
      margin-bottom: 15px;
      border-radius: 15px;
      overflow: hidden;
      border: 2px solid #ff006e;
    }
    .ad-image {
      width: 100%;
      height: auto;
      display: block;
    }
    .ad-timer {
      font-size: 40px;
      font-weight: 900;
      color: #fff;
      margin: 10px 0;
    }
    .streak-counter {
      position: absolute;
      right: 15px;
      bottom: 15px;
      background: rgba(0, 0, 0, 0.6);
      color: #ff006e;
      font-weight: 900;
      font-size: 24px;
      padding: 6px 12px;
      border-radius: 12px;
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255, 0, 110, 0.5);
      z-index: 12;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }
    .streak-counter .fire {
      animation: pulse 1.5s infinite;
    }
    .streak-counter .count {
      font-size: 28px;
    }

    const originalVideos = [...videos];
    
    // ---------- SORTING LOGIC ----------
    let sortMode = 'asc'; 
    
    function getSortIcon() {
      if (sortMode === 'asc') return '⬇️'; 
      if (sortMode === 'desc') return '🔀'; 
      return '⬆️'; 
    }

    window.handleSort = function(e) {
      if (e) e.stopPropagation();
      
      if (activePlayers[currentActiveIndex] && typeof activePlayers[currentActiveIndex].pause === 'function') {
        activePlayers[currentActiveIndex].pause();
        if (activePlayers[currentActiveIndex].linkedAudio) {
          activePlayers[currentActiveIndex].linkedAudio.pause();
        }
      }
      
      for (let key in activePlayers) {
        delete activePlayers[key];
      }

      if (sortMode === 'asc') {
        sortMode = 'desc';
        videos = [...originalVideos].reverse();
      } else if (sortMode === 'desc') {
        sortMode = 'shuffle';
        let shuffled = [...originalVideos];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        videos = shuffled;
      } else {
        sortMode = 'asc';
        videos = [...originalVideos];
      }

      container.innerHTML = '';
      currentActiveIndex = 0;
      container.scrollTop = 0;
      initFeed();
    };

    // ---------- STREAK LOGIC ----------
    const STREAK_KEY = 'spicyReelsStreak';
    const LAST_PLAYED_KEY = 'spicyReelsLastPlayed';
    const THIRTY_PERCENT = 0.3;
    const INACTIVITY_RESET_MS = 5 * 60 * 1000; 

    let streak = parseInt(localStorage.getItem(STREAK_KEY) || '0', 10);
    let lastPlayedTime = parseInt(localStorage.getItem(LAST_PLAYED_KEY) || '0', 10);
    const now = Date.now();

    if (now - lastPlayedTime > INACTIVITY_RESET_MS) {
      streak = 0;
      localStorage.setItem(STREAK_KEY, '0');
    }

    const streakCounterEl = document.getElementById('streakCounter');
    
    function updateStreakDisplay() {
      streakCounterEl.style.display = 'flex';
      streakCounterEl.querySelector('.count').textContent = streak;
    }

    function incrementStreak() {
      streak++;
      localStorage.setItem(STREAK_KEY, streak.toString());
      localStorage.setItem(LAST_PLAYED_KEY, Date.now().toString());
      updateStreakDisplay();
    }

    // ---------- FEED RENDERING & NAVIGATION LOGIC ----------
    let isMuted = true;
    let currentActiveIndex = 0;
    const activePlayers = {};
    const container = document.getElementById('videoContainer');

    function initFeed() {
      videos.forEach((video, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'video-wrapper';
        wrapper.setAttribute('data-index', index);

        wrapper.innerHTML = `
          <div class="video-placeholder" id="placeholder-${index}">
            <div class="title-overlay">${video.type === 'embed' ? 'Spicy Reel #' + video.title : 'Premium Preview'}</div>
            <div class="tap-to-play">▶ Tap to Load & Play</div>
          </div>
          <div class="video-loader" id="loader-${index}"></div>
          <div class="loader-text" id="loader-text-${index}">Heating up...</div>
          
          <div class="unmute-btn">${isMuted ? '🔇' : '🔊'}</div>
          <div class="filter-btn" onclick="handleSort(event)">${getSortIcon()}</div>
          
          <div class="video-info">
            <div class="video-title">${video.type === 'embed' ? ' ' + video.title : video.title}</div>
            <div class="video-description">${video.desc || ''}</div>
          </div>
          
          <div class="scroll-indicator">⬇ Swipe or Scroll Down</div>
        `;

        wrapper.addEventListener('click', (e) => {
          if (e.target.closest('.unmute-btn') || e.target.closest('.filter-btn')) return;
          toggleVideoPlayback(wrapper, video, index);
        });

        container.appendChild(wrapper);
      });

      const firstWrapper = container.querySelector('.video-wrapper');
      if (firstWrapper) {
        toggleVideoPlayback(firstWrapper, videos[0], 0);
      }
      
      if(streak > 0) updateStreakDisplay();
    }

    function toggleVideoPlayback(wrapper, video, index) {
      let placeholder = wrapper.querySelector('.video-placeholder');
      let loader = wrapper.querySelector('.video-loader');
      let loaderText = wrapper.querySelector('.loader-text');
      let mediaEl = wrapper.querySelector('.video-player, .embed-player');

      if (!mediaEl) {
        if (placeholder) placeholder.style.display = 'none';
        if (loader) loader.style.display = 'block';
        if (loaderText) loaderText.style.display = 'block';

        if (video.type === 'embed') {
          mediaEl = document.createElement('iframe');
          mediaEl.className = 'embed-player';
          mediaEl.src = video.url;
          mediaEl.allow = "autoplay; fullscreen";
          
          wrapper.insertBefore(mediaEl, wrapper.firstChild);
          activePlayers[index] = mediaEl;

          mediaEl.addEventListener('load', () => {
            if (loader) loader.style.display = 'none';
            if (loaderText) loaderText.style.display = 'none';
            
            setTimeout(() => {
              if (index === currentActiveIndex) {
                incrementStreak();
                if (streak % 4 === 0) fireInterstitialAd();
              }
            }, 6000);
          });
        } else {
          mediaEl = document.createElement('video');
          mediaEl.className = 'video-player';
          mediaEl.src = video.url;
          mediaEl.loop = true;
          mediaEl.muted = isMuted;
          mediaEl.playsInline = true;
          mediaEl.setAttribute('webkit-playsinline', 'true');

          // Audio separation setup using Hls.js
          if (video.audioUrl) {
            let audioEl = document.createElement('audio');
            audioEl.loop = true;
            audioEl.muted = isMuted;

            if (Hls.isSupported()) {
              const hls = new Hls({ autoStartLoad: true });
              hls.loadSource(video.audioUrl);
              hls.attachMedia(audioEl);
            } else if (audioEl.canPlayType('application/vnd.apple.mpegurl')) {
              audioEl.src = video.audioUrl;
            }

            mediaEl.linkedAudio = audioEl;

            // Tight synchronization: audio waits for the video state
            mediaEl.addEventListener('playing', () => {
              audioEl.currentTime = mediaEl.currentTime;
              if (!isMuted) audioEl.muted = false;
              audioEl.play().catch(err => console.warn("Audio catch up blocked:", err));
            });

            mediaEl.addEventListener('waiting', () => {
              audioEl.pause(); // Video stalled/buffering: stop audio and wait
            });

            mediaEl.addEventListener('pause', () => {
              audioEl.pause();
            });

            mediaEl.addEventListener('seeking', () => {
              audioEl.pause(); // Video scrubbing/seeking: stop audio instantly
            });

            mediaEl.addEventListener('seeked', () => {
              audioEl.currentTime = mediaEl.currentTime;
              if (!mediaEl.paused) {
                audioEl.play().catch(() => {});
              }
            });

            // Prevent drift over prolonged viewing
            mediaEl.addEventListener('timeupdate', () => {
              if (!mediaEl.paused && !mediaEl.seeking) {
                if (Math.abs(audioEl.currentTime - mediaEl.currentTime) > 0.15) {
                  audioEl.currentTime = mediaEl.currentTime;
                }
              }
            });
          }

          wrapper.insertBefore(mediaEl, wrapper.firstChild);
          activePlayers[index] = mediaEl;

          mediaEl.addEventListener('canplay', () => {
            if (loader) loader.style.display = 'none';
            if (loaderText) loaderText.style.display = 'none';
            if (index === currentActiveIndex) {
              mediaEl.play().catch(err => console.warn("Autoplay block averted:", err));
            }
          });

          let milestoneMet = false;
          mediaEl.addEventListener('timeupdate', () => {
            if (!milestoneMet && mediaEl.duration > 0) {
              if (mediaEl.currentTime / mediaEl.duration >= THIRTY_PERCENT) {
                milestoneMet = true;
                incrementStreak();
                if (streak % 4 === 0) {
                  fireInterstitialAd();
                }
              }
            }
          });
        }
      } else {
        if (video.type !== 'embed') {
          if (mediaEl.paused) {
            mediaEl.play().catch(() => {});
          } else {
            mediaEl.pause();
          }
        }
      }
    }

    function fireInterstitialAd() {
      if (activePlayers[currentActiveIndex] && typeof activePlayers[currentActiveIndex].pause === 'function') {
        activePlayers[currentActiveIndex].pause();
        if (activePlayers[currentActiveIndex].linkedAudio) {
          activePlayers[currentActiveIndex].linkedAudio.pause();
        }
      }

      const modal = document.getElementById('adModal');
      const countdownTimer = document.getElementById('adTimer');
      const imageTarget = document.getElementById('adImage');
      const linkTarget = document.getElementById('adLink');

      imageTarget.src = "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500&q=80"; 
      linkTarget.href = "https://onlyfans.com";
      modal.style.display = 'flex';

      let count = 5; 
      countdownTimer.textContent = count;

      const adInterval = setInterval(() => {
        count--;
        countdownTimer.textContent = count;
        if (count <= 0) {
          clearInterval(adInterval);
          modal.style.display = 'none';
          if (activePlayers[currentActiveIndex] && typeof activePlayers[currentActiveIndex].play === 'function') {
            activePlayers[currentActiveIndex].play().catch(() => {});
          }
        }
      }, 1000);
    }

    document.addEventListener('click', (e) => {
      if (e.target.closest('.unmute-btn')) {
        isMuted = !isMuted;
        Object.keys(activePlayers).forEach(idx => {
          if (videos[idx].type !== 'embed' && activePlayers[idx]) {
            activePlayers[idx].muted = isMuted;
            if (activePlayers[idx].linkedAudio) {
              activePlayers[idx].linkedAudio.muted = isMuted;
            }
          }
        });
        document.querySelectorAll('.unmute-btn').forEach(btn => {
          btn.textContent = isMuted ? '🔇' : '🔊';
        });
      }
    });

    container.addEventListener('scroll', () => {
      const wrapperSnapUnit = window.innerHeight - 60;
      const targetIndex = Math.round(container.scrollTop / wrapperSnapUnit);

      if (targetIndex !== currentActiveIndex && targetIndex < videos.length) {
        if (activePlayers[currentActiveIndex] && typeof activePlayers[currentActiveIndex].pause === 'function') {
          activePlayers[currentActiveIndex].pause();
          if (activePlayers[currentActiveIndex].linkedAudio) {
            activePlayers[currentActiveIndex].linkedAudio.pause();
          }
        }

        currentActiveIndex = targetIndex;

        const prospectiveWrapper = container.querySelectorAll('.video-wrapper')[currentActiveIndex];
        if (prospectiveWrapper) {
          toggleVideoPlayback(prospectiveWrapper, videos[currentActiveIndex], currentActiveIndex);
        }
      }
    });

    initFeed();
  </script>
</body>
</html>
