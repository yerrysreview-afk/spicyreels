    * {

      background: #000;
      color: white;
      overflow: hidden;
      height: 100vh;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(135deg, #ff006e, #8b00ff, #ff0054);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      box-shadow: 0 4px 12px rgba(255, 0, 110, 0.3);
      transition: display 0.3s ease;
    }
    .header.hidden {
      display: none;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chilli-logo {
      font-size: 34px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .site-name {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(45deg, #fff, #ffb3d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .video-container {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .video-container.full-height {
      top: 0;
      height: 100vh;
    }
    .video-container::-webkit-scrollbar {
      display: none;
    }
    .video-wrapper {
      position: relative;
      width: 100%;
      height: calc(100vh - 60px);
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    .video-wrapper.full-height {
      height: 100vh;
    }
    .video-player {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: none;
    }
    .video-loader {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 50px;
      height: 50px;
      margin-left: -25px;
      margin-top: -25px;
      border: 5px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ff006e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      z-index: 11;
      display: none;
    }
    .loader-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, 35px);
      color: #ff006e;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      z-index: 11;
      display: none;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      white-space: nowrap;
      animation: pulse 1s ease-in-out infinite;
    }
    .video-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0033, #330033, #4d0052);
      color: #ff6ec7;
      font-size: 24px;
      font-weight: 600;
      cursor: pointer;
      flex-direction: column;
      gap: 20px;
      position: relative;
    }
    .video-placeholder video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
    .video-placeholder .title-overlay,
    .video-placeholder .tap-to-play {
      position: relative;
      z-index: 2;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
    }
    .tap-to-play {
      font-size: 18px;
      opacity: 0.8;
      animation: fadeIn 1s ease-in-out infinite alternate;
    }
    @keyframes fadeIn {
      from { opacity: 0.5; }
      to { opacity: 1; }
    }
    .video-info {
      position: absolute;
      bottom: 80px;
      left: 20px;
      right: 80px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
      z-index: 10;
    }
    .video-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .video-description {
      font-size: 16px;
      color: #ffb3d9;
    }
    .side-actions {
      position: absolute;
      right: 15px;
      bottom: 100px;
      display: flex;
      flex-direction: column;
      gap: 25px;
      z-index: 10;
    }
    .action-btn {
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      width: 56px;
      height: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    .action-btn:active {
      transform: scale(0.9);
    }
    .action-icon {
      font-size: 28px;
    }
    .action-count {
      font-size: 12px;
      margin-top: 2px;
      font-weight: 600;
    }
    .like-btn.liked .action-icon {
      color: #ff0054;
    }
    .unmute-btn {
      position: absolute;
      top: 20px;
      right: 15px;
      z-index: 10;
      font-size: 28px;
      cursor: pointer;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }
    .filter-btn {
      position: absolute;
      top: 80px;
      right: 15px;
      z-index: 10;
      font-size: 24px;
      cursor: pointer;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .scroll-indicator {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-10px); }
    }
    .ad-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .ad-content {
      background: linear-gradient(135deg, #1a0033, #330033);
      padding: 20px;
      border-radius: 20px;
      color: #ff6ec7;
      font-size: 20px;
      text-align: center;
      border: 3px solid #ff006e;
      box-shadow: 0 0 30px rgba(255, 0, 110, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 95%;
      max-width: 450px;
    }
    .ad-image-link {

    .ad-image {

    }

    .streak-counter {
      position: absolute;
      right: 15px;

      background: rgba(0, 0, 0, 0.6);
      color: #ff006e;
      font-weight: 900;
      font-size: 24px;
      padding: 6px 12px;

      gap: 6px;

    // ---------- STREAK LOGIC ----------
    const STREAK_KEY = 'spicyReelsStreak';
    const LAST_PLAYED_KEY = 'spicyReelsLastPlayed';
    const THIRTY_PERCENT = 0.3;
    const INACTIVITY_RESET_MS = 5 * 60 * 1000; // 5 minutes

    let streak = parseInt(localStorage.getItem(STREAK_KEY) || '0', 10);
    let lastPlayedTime = parseInt(localStorage.getItem(LAST_PLAYED_KEY) || '0', 10);
    const now = Date.now();

    if (now - lastPlayedTime > INACTIVITY_RESET_MS) {
      streak = 0;
      localStorage.setItem(STREAK_KEY, '0');
    }

    function updateStreakDisplay() {
      document.querySelectorAll('.streak-counter .count').forEach(el => el.textContent = streak);
    }

    function incrementStreak() {
      streak++;
      localStorage.setItem(STREAK_KEY, streak.toString());
      localStorage.setItem(LAST_PLAYED_KEY, Date.now().toString());
      updateStreakDisplay();
    }

    // ---------- VIDEO ORDERING & FILTERING ----------
    let adCountdownInterval;
    let isHeaderPermanentlyHidden = false;

    // Filter state: 'random' | 'asc' | 'desc'
    let currentFilterMode = 'random';
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    let orderedVideos = [];
    let numberedReels = [];
    let onlyFansReels = [];

    // --- Function to organize videos based on filter ---
    function organizeVideos() {
      // 1. Reset Arrays from source
      numberedReels = videos.slice(0, 116).map(video => ({ ...video, type: video.type || "numbered" }));
      onlyFansReels = videos.slice(116).map(video => ({ ...video, type: "onlyfans" }));
      
      // 2. Apply Sort to numbered reels
      if (currentFilterMode === 'random') {
        numberedReels = shuffle(numberedReels);
      } else if (currentFilterMode === 'asc') {
        numberedReels.sort((a, b) => parseInt(a.title) - parseInt(b.title));
      } else if (currentFilterMode === 'desc') {
        numberedReels.sort((a, b) => parseInt(b.title) - parseInt(a.title));
      }

      // Always shuffle ads
      onlyFansReels = shuffle(onlyFansReels);

      // 3. Interleave logic (2 videos, 1 ad)
      orderedVideos = [];
      let numberedIndex = 0;
      let onlyFansIndex = 0;
      
      while (orderedVideos.length < videos.length) {
        for (let i = 0; i < 2 && numberedIndex < numberedReels.length; i++) {
          orderedVideos.push(numberedReels[numberedIndex]);
          numberedIndex = (numberedIndex + 1) % numberedReels.length;
        }
        if (onlyFansIndex < onlyFansReels.length) {
          orderedVideos.push(onlyFansReels[onlyFansIndex]);
          onlyFansIndex = (onlyFansIndex + 1) % onlyFansReels.length;
        }
      }

      orderedVideos.forEach(video => {
        video.id = video.url;
      });
    }

    // Initial organization
    organizeVideos();

    let currentIndex = 0;
    let hasStarted = false;
    let adShowing = false;
    let playedSet = new Set();
    let likes = {};
    let userLiked = new Set();
    let isScrolling = false;
    let scrollTimeout;
    let isGloballyMuted = true;

    // ---------- RENDER ----------
    function renderVideos() {
      const container = document.getElementById("videoContainer");
      container.innerHTML = "";
      
      // Determine Filter Icon based on current mode
      let filterIcon = '🔀';
      if (currentFilterMode === 'asc') filterIcon = '⬇️';
      if (currentFilterMode === 'desc') filterIcon = '⬆️';

      orderedVideos.forEach((video, index) => {
        const wrapper = document.createElement("div");
        wrapper.className = "video-wrapper";
        wrapper.dataset.id = video.id;
        wrapper.dataset.index = index;
        wrapper.dataset.url = video.url;
        
        let backgroundVideoHtml = '';
        if (video.type !== 'rumble' && isHeaderPermanentlyHidden) {
            backgroundVideoHtml = `<video src="${video.url}" poster="${video.url}" preload="metadata" muted></video>`;
        }

        const placeholderContent = `
         ${backgroundVideoHtml}
         <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; color: rgba(255,255,255,0.9); pointer-events: none; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));">
            ▶️
         </div>
         <div class="title-overlay">${video.title}</div>
         <div class="tap-to-play" style="line-height: 2;">
           🔥(18+) 
           <style>@keyframes popDonate { 0% { transform: scale(1); } 100% { transform: scale(1.1); box-shadow: 0 0 12px #ff006e; } }</style>
           <a href="https://www.paypal.com/ncp/payment/GY5F5A2B47VS8" target="_blank" onclick="event.stopPropagation()" style="display: inline-block; background: linear-gradient(45deg, #ff006e, #8b00ff); color: white; padding: 4px 10px; border-radius: 8px; text-decoration: none; font-weight: 900; border: 1px solid rgba(255,255,255,0.8); animation: popDonate 0.8s infinite alternate; margin: 0 5px;">DONATE</a> 
           to keep the site running
         </div>`;
     
        // --- ADDED: Loader text and Filter Button HTML ---
        wrapper.innerHTML = `
          <div class="video-loader"></div>
          <div class="loader-text">Loading. Just wait...</div>
          <div class="video-placeholder">
            ${placeholderContent}
          </div>
          <div class="unmute-btn">🔇</div>
          <div class="filter-btn">${filterIcon}</div>
          <div class="video-info">
            <div class="video-title">${video.title}</div>
            <div class="video-description">${video.desc}</div>
          </div>
          ${index === 0 ? '<div class="scroll-indicator">⬇️ Scroll for more </div>' : ''}
          <div class="streak-counter"><span class="fire">🔥</span><span class="count">${streak}</span></div>
        `;
        container.appendChild(wrapper);
      });
      setupInteractions();
      setupScrollDetection();
      updateStreakDisplay();
    }

    // ---------- INTERACTIONS ----------
    function setupInteractions() {
      document.querySelectorAll('.video-wrapper').forEach(wrapper => {
        wrapper.addEventListener('click', (e) => {
          // Exclude filter btn from click-to-play
          if (!e.target.closest('.action-btn') && !e.target.closest('.unmute-btn') && !e.target.closest('.filter-btn') && !isLoaded(wrapper) && !adShowing) {
            hasStarted = true;
            loadVideo(wrapper);
            wrapper.querySelector('.scroll-indicator')?.remove();
            if (parseInt(wrapper.dataset.index) === 0 && !isHeaderPermanentlyHidden) {
              const header = document.getElementById('header');
              header.classList.add('hidden');
              const videoContainer = document.getElementById('videoContainer');
              videoContainer.classList.add('full-height');
              document.querySelectorAll('.video-wrapper').forEach(w => w.classList.add('full-height'));
              isHeaderPermanentlyHidden = true;
              renderVideos();
            }
          }
        });
      });

      document.querySelectorAll('.unmute-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          isGloballyMuted = !isGloballyMuted;
          const currentWrapper = btn.closest('.video-wrapper');
          
          // Apply to video if it's an MP4
          const currentVideoEl = currentWrapper.querySelector('video.video-player');
          if (currentVideoEl) {
            currentVideoEl.muted = isGloballyMuted;
          }
          
          document.querySelectorAll('.unmute-btn').forEach(icon => {
            icon.textContent = isGloballyMuted ? '🔇' : '🔊';
          });
        });
      });

      // --- Filter Button Logic ---
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          // Cycle modes: Random -> Asc -> Desc -> Random
          if (currentFilterMode === 'random') {
            currentFilterMode = 'asc';
          } else if (currentFilterMode === 'asc') {
            currentFilterMode = 'desc';
          } else {
            currentFilterMode = 'random';
          }

          // Re-organize
          organizeVideos();
          // Reset index
          currentIndex = 0;
          playedSet.clear(); // Clear played history to reset ad logic if needed
          // Re-render
          renderVideos();
        });
      });
    }

    function setupScrollDetection() {
      const container = document.getElementById('videoContainer');
      container.addEventListener('scroll', () => {
        isScrolling = true;
        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
          isScrolling = false;
          handleScrollEnd();
        }, 150);
      });
    }

    function handleScrollEnd() {
      const container = document.getElementById('videoContainer');
      const wrappers = document.querySelectorAll('.video-wrapper');
      let closestWrapper = null;
      let minDistance = Infinity;
      wrappers.forEach(wrapper => {
        const rect = wrapper.getBoundingClientRect();
        const distance = Math.abs(rect.top - (container.classList.contains('full-height') ? 0 : 60));
        if (distance < minDistance) {
          minDistance = distance;
          closestWrapper = wrapper;
        }
      });

      if (closestWrapper) {
        const newIndex = parseInt(closestWrapper.dataset.index);
        if (newIndex !== currentIndex) {
          const prevWrapper = wrappers[currentIndex];
          if (prevWrapper && isLoaded(prevWrapper)) {
            const id = prevWrapper.dataset.id;
            unloadVideo(prevWrapper);
            if (!playedSet.has(id)) {
              playedSet.add(id);
              if (playedSet.size > 0 && playedSet.size % 3 === 0) {
                currentIndex = newIndex;
                const adTriggerCount = playedSet.size / 3;
                // showAd(adIndexToShow);
                return;
              }
            }
          }
          currentIndex = newIndex;
          if (hasStarted && !adShowing && !isLoaded(closestWrapper)) {
            loadVideo(closestWrapper);
          }
        }
      }
    }

    function isLoaded(wrapper) {
      return !!wrapper.querySelector('video.video-player') || !!wrapper.querySelector('iframe.video-player');
    }

    function loadVideo(wrapper) {
      const url = wrapper.dataset.url;
      if (!url) return;
      const loader = wrapper.querySelector('.video-loader');
      const loaderText = wrapper.querySelector('.loader-text');
      const placeholder = wrapper.querySelector('.video-placeholder');

      if (loader) loader.style.display = 'block';
      if (loaderText) loaderText.style.display = 'block';
      if (placeholder) placeholder.remove();
      
      // Look up the current video's data to check its type
      const videoData = orderedVideos.find(v => v.id === wrapper.dataset.id);

      // --- NEW: RUMBLE IFRAME LOGIC ---
      if (videoData && videoData.type === 'rumble') {
        const iframeEl = document.createElement('iframe');
        // Add autoplay variables for Rumble
        const separator = url.includes('?') ? '&' : '?';
        iframeEl.src = url + separator + 'autoplay=2'; 
        iframeEl.className = 'video-player';
        iframeEl.setAttribute('frameborder', '0');
        iframeEl.setAttribute('allowfullscreen', 'true');
        iframeEl.setAttribute('allow', 'autoplay; fullscreen');
        
        iframeEl.style.pointerEvents = 'auto'; 

        wrapper.insertBefore(iframeEl, wrapper.querySelector('.video-info'));

        if (loader) loader.style.display = 'none';
        if (loaderText) loaderText.style.display = 'none';

        // Fake the streak timer for iframes since we can't track exact time inside an iframe
        setTimeout(() => incrementStreak(), 5000); 
        return;
      }

      // --- EXISTING MP4 LOGIC ---
      const videoEl = document.createElement('video');
      videoEl.src = url;
      videoEl.className = 'video-player';
      videoEl.autoplay = true;
      videoEl.muted = isGloballyMuted;
      videoEl.loop = true;
      videoEl.playsInline = true;

      videoEl.addEventListener('waiting', () => {
        if (loader) loader.style.display = 'block';
        if (loaderText) loaderText.style.display = 'block';
      });
      videoEl.addEventListener('playing', () => {
        if (loader) loader.style.display = 'none';
        if (loaderText) loaderText.style.display = 'none';
      });

      let counted = false;
      const checkThirty = () => {
        if (!counted && videoEl.duration && videoEl.currentTime >= videoEl.duration * THIRTY_PERCENT) {
          counted = true;
          incrementStreak();
        }
      };
      videoEl.addEventListener('timeupdate', checkThirty);
      videoEl.addEventListener('ended', () => {
        if (!counted) incrementStreak();
      });

      wrapper.insertBefore(videoEl, wrapper.querySelector('.video-info'));
      
      const unmuteBtn = wrapper.querySelector('.unmute-btn');
      if (unmuteBtn) {
        unmuteBtn.textContent = isGloballyMuted ? '🔇' : '🔊';
      }
      
      videoEl.play().catch(error => {
        console.error("Video playback failed:", error);
        if (loader) loader.style.display = 'none';
        if (loaderText) loaderText.style.display = 'none';
      });
    }

    function unloadVideo(wrapper) {
      // Look for either a video or an iframe
      const playerEl = wrapper.querySelector('video.video-player') || wrapper.querySelector('iframe.video-player');
      
      if (playerEl) {
        if (playerEl.tagName === 'VIDEO') {
          playerEl.pause();
          playerEl.removeAttribute('src');
          playerEl.load();
        }
        playerEl.remove();
      }
      
      if (!wrapper.querySelector('.video-placeholder')) {
        const video = orderedVideos.find(v => v.id === wrapper.dataset.id);
        const placeholder = document.createElement('div');
        placeholder.className = 'video-placeholder';
        
        let backgroundVideoHtml = '';
        if (video.type !== 'rumble' && isHeaderPermanentlyHidden) {
            backgroundVideoHtml = `<video src="${video.url}" poster="${video.url}" preload="metadata" muted></video>`;
        }

        const placeholderContent = `
          ${backgroundVideoHtml}
          <div class="title-overlay">${video.title}</div>
          <div class="tap-to-play">Explicit content(18+) Tap to play</div>`;
          
        placeholder.innerHTML = placeholderContent;
        const infoDiv = wrapper.querySelector('.video-info');
        wrapper.insertBefore(placeholder, infoDiv);
      }
    }

    function pauseAllVideos() {
      document.querySelectorAll('video.video-player').forEach(videoEl => {
        videoEl.pause();
      });
    }

    function showAd(adIndex) {
      pauseAllVideos();
      adShowing = true;
    }

    function hideAd() {
      clearInterval(adCountdownInterval);
      adShowing = false;
      const adModal = document.getElementById('adModal');
      adModal.style.display = 'none';
      const header = document.getElementById('header');
      if (isHeaderPermanentlyHidden) {
        header.classList.add('hidden');
      }
      const wrappers = document.querySelectorAll('.video-wrapper');
      const currentWrapper = wrappers[currentIndex];
      if (currentWrapper && !isLoaded(currentWrapper)) {
        loadVideo(currentWrapper);
      }
    }

    renderVideos();
  </script>
</body>
</html>
